# Sovereignly Global Network — Local Development Topology
#
# Simulates the full distributed network:
#   1 Control Plane  (port 9090)
#   2 Cluster Nodes  (ports 8787, 8797)
#   2 Edge Nodes     (ports 8788, 8789)
#
# Usage: docker compose -f deploy/docker-compose.network.yml up

services:
  # ── Control Plane ──
  control-plane:
    build:
      context: ..
      dockerfile: Dockerfile.control-plane
    ports:
      - "9090:9090"
    environment:
      PORT: "9090"
      ADMIN_TOKEN: "dev-admin-token"
      DATA_DIR: "/data/control-plane"
    volumes:
      - control_data:/data/control-plane

  # ── Cluster Node: US-East ──
  cluster-us-east:
    build:
      context: ..
      dockerfile: apps/cloud/Dockerfile
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      SOVEREIGN_NODE_ID: "us-east-1"
      NODE_ROLE: "cluster"
      NODE_REGION: "us-east"
      CLUSTER_ID: "us-east"
      CONTROL_PLANE_URL: "http://control-plane:9090"
      ADMIN_TOKEN: "dev-admin-token"
      SOVEREIGN_SERVER_KEY: "dev-server-key-do-not-use-in-production"
      JWT_SECRET: "dev-jwt-secret-do-not-use-in-production"
      DATA_DIR: "/data"
    volumes:
      - cluster_us_east_data:/data
    depends_on:
      - control-plane

  # ── Cluster Node: Europe ──
  cluster-europe:
    build:
      context: ..
      dockerfile: apps/cloud/Dockerfile
    ports:
      - "8797:8787"
    environment:
      PORT: "8787"
      SOVEREIGN_NODE_ID: "eu-west-1"
      NODE_ROLE: "cluster"
      NODE_REGION: "europe"
      CLUSTER_ID: "europe"
      CONTROL_PLANE_URL: "http://control-plane:9090"
      ADMIN_TOKEN: "dev-admin-token"
      SOVEREIGN_SERVER_KEY: "dev-server-key-do-not-use-in-production"
      JWT_SECRET: "dev-jwt-secret-do-not-use-in-production"
      DATA_DIR: "/data"
    volumes:
      - cluster_europe_data:/data
    depends_on:
      - control-plane

  # ── Edge Node: US-East ──
  edge-us-east:
    build:
      context: ..
      dockerfile: Dockerfile.edge
    ports:
      - "8788:8788"
    environment:
      PORT: "8788"
      EDGE_NODE_ID: "edge-us-east-1"
      EDGE_REGION: "us-east"
      CLUSTER_URL: "http://cluster-us-east:8787"
      CONTROL_PLANE_URL: "http://control-plane:9090"
    depends_on:
      - control-plane
      - cluster-us-east

  # ── Edge Node: Europe ──
  edge-europe:
    build:
      context: ..
      dockerfile: Dockerfile.edge
    ports:
      - "8789:8788"
    environment:
      PORT: "8788"
      EDGE_NODE_ID: "edge-eu-west-1"
      EDGE_REGION: "europe"
      CLUSTER_URL: "http://cluster-europe:8787"
      CONTROL_PLANE_URL: "http://control-plane:9090"
    depends_on:
      - control-plane
      - cluster-europe

volumes:
  control_data:
  cluster_us_east_data:
  cluster_europe_data:
