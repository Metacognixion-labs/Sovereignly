name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit 2>/dev/null || true

      - name: Run integration tests
        run: bun test src/test/integration.test.ts
        env:
          NODE_ENV: test
          ANCHOR_TIER: starter
          SOVEREIGN_SERVER_KEY: ci-test-key-not-for-production-use
          JWT_SECRET: ci-test-jwt-not-for-production-use-xxxxxxxx
          ADMIN_TOKEN: ci-test-admin

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
